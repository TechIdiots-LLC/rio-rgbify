name: Docker Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  docker-test:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: rio-rgbify:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare test workspace
        run: |
          mkdir -p /tmp/rio-rgbify-test
          cp test/fixtures/elev.tif /tmp/rio-rgbify-test/
          cp test/fixtures/gebco_sample.mbtiles /tmp/rio-rgbify-test/

      - name: Test rgbify → GeoTIFF (mapbox encoding)
        run: |
          docker run --rm \
            -v /tmp/rio-rgbify-test:/data \
            rio-rgbify:test \
            rgbify -e mapbox -b -10000 -i 0.1 elev.tif elev-mapbox.tif
          test -s /tmp/rio-rgbify-test/elev-mapbox.tif
          echo "✓ rgbify → GeoTIFF (mapbox)"

      - name: Test rgbify → GeoTIFF (terrarium encoding)
        run: |
          docker run --rm \
            -v /tmp/rio-rgbify-test:/data \
            rio-rgbify:test \
            rgbify -e terrarium elev.tif elev-terrarium.tif
          test -s /tmp/rio-rgbify-test/elev-terrarium.tif
          echo "✓ rgbify → GeoTIFF (terrarium)"

      - name: Test rgbify → MBTiles (mapbox encoding)
        run: |
          docker run --rm \
            -v /tmp/rio-rgbify-test:/data \
            rio-rgbify:test \
            rgbify -e mapbox -b -10000 -i 0.1 --min-z 0 --max-z 4 --format png elev.tif elev-mapbox.mbtiles
          test -s /tmp/rio-rgbify-test/elev-mapbox.mbtiles
          echo "✓ rgbify → MBTiles (mapbox)"

      - name: Test rgbify → MBTiles (terrarium encoding)
        run: |
          docker run --rm \
            -v /tmp/rio-rgbify-test:/data \
            rio-rgbify:test \
            rgbify -e terrarium --min-z 0 --max-z 4 --format png elev.tif elev-terrarium.mbtiles
          test -s /tmp/rio-rgbify-test/elev-terrarium.mbtiles
          echo "✓ rgbify → MBTiles (terrarium)"
